name: Benchmarks

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths:
            - benchmark/**
            - packages/core/src/**
            - package.json
            - bun.lock
            - tsconfig.json

concurrency:
    group: benchmarks-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    benchmark:
        name: Run benchmarks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run time benchmarks
              run: bun run bench | tee benchmark-time.txt

            - name: Run memory benchmarks
              run: bun run bench:memory | tee benchmark-memory.txt

            - name: Upload benchmark artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: benchmark-results
                  path: |
                      benchmark-time.txt
                      benchmark-memory.txt
