name: CI

on:
    pull_request:
    push:
        branches:
            - main

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Typecheck
              run: bun run check:types

            - name: Lint
              run: bun run check:lint

    package:
        name: Package validation
        runs-on: ubuntu-latest
        needs: quality

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Validate core package tarball
              run: bun run pack:core
