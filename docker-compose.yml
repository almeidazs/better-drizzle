services:
    postgres:
        image: postgres:16-alpine
        container_name: better-drizzle-postgres
        restart: unless-stopped
        ports:
            - "${POSTGRES_PORT:-5432}:5432"
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-better_drizzle}
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./docker/postgres/init:/docker-entrypoint-initdb.d
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-better_drizzle}",
                ]
            interval: 5s
            timeout: 3s
            retries: 5

    mysql:
        image: mysql:8
        container_name: better-drizzle-mysql
        restart: unless-stopped
        ports:
            - "${MYSQL_PORT:-3306}:3306"
        environment:
            MYSQL_DATABASE: ${MYSQL_DB:-better_drizzle}
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mysql}
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "mysqladmin ping -uroot -p${MYSQL_ROOT_PASSWORD:-mysql} --silent",
                ]
            interval: 5s
            timeout: 3s
            retries: 5

volumes:
    postgres_data:
    mysql_data:
